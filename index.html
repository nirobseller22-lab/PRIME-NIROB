<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>prime nirob</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
overflow:hidden;
}

/* VIDEO */

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* dark overlay */

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}

/* ENTER */

#enter{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#enter button{
padding:15px 45px;
font-size:20px;
border:none;
border-radius:30px;
background:white;
cursor:pointer;
transition:0.3s;
}

#enter button:hover{
transform:scale(1.1);
}

/* MAIN */

#main{
display:none;
height:100vh;
justify-content:center;
align-items:center;
}

/* CARD */

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:45px;
border-radius:25px;
width:350px;
text-align:center;
box-shadow:0 0 40px rgba(255,255,255,0.2);
animation:fade 1.5s;
}

@keyframes fade{
from{opacity:0; transform:scale(0.9);}
to{opacity:1;}
}

/* PROFILE */

.profile{
width:90px;
border-radius:50%;
margin-bottom:10px;
border:2px solid white;
}

/* TITLE */

.title{
font-size:34px;
letter-spacing:3px;
margin:10px 0;

text-shadow:
0 0 10px white,
0 0 20px white,
0 0 40px white;

animation:glow 2s infinite alternate;
}

@keyframes glow{

from{
text-shadow:0 0 10px white;
}

to{
text-shadow:0 0 25px white,0 0 60px white;
}

}

/* ICONS */

.icons{
margin-top:20px;
}

.icons img{
width:40px;
margin:12px;
cursor:pointer;
transition:0.3s;
filter:brightness(200%);
}

.icons img:hover{
transform:scale(1.3);
filter:drop-shadow(0 0 10px white);
}

/* STARS */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:star 6s linear infinite;
}

@keyframes star{

0%{transform:translateY(-10px);opacity:0}

50%{opacity:1}

100%{transform:translateY(100vh);opacity:0}

}

</style>
</head>

<body>

<video id="bg" loop>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- ENTER -->

<div id="enter">

<h1>Click To Enter</h1>
<br>

<button onclick="enter()">ENTER 🔊</button>

</div>

<!-- MAIN -->

<div id="main">

<div class="card">

<img src="profile.jpg" class="profile">

<h1 class="title"> NIROB !!</h1>

<p>💻 Panel Making
🌐 Web Developer
🤖 Bot Developer</p>
<p>🌍 Earth</p>

<div class="icons">

<a href="https://www.youtube.com/@ErrorRegedit" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</a>

<a href="https://instagram.com" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<a href="https://discord.gg/v35EVykTHS" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
</a>

</div>

</div>

</div>

<script>

let video=document.getElementById("bg")

function enter(){

document.getElementById("enter").style.display="none"
document.getElementById("main").style.display="flex"

video.muted=false
video.play()

}

/* stars */

for(let i=0;i<60;i++){

let star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"%"
star.style.animationDuration=(Math.random()*5+4)+"s"

document.body.appendChild(star)

}

</script>

</body>
</html>
